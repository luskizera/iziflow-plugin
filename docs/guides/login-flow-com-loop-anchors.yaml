metadata:
  name: Login e Fluxo de Indicação (com loop + anchors)
  layout:
    algorithm: auto
    unit: 300
    first_node_position: center
    spacing:
      horizontal: 4u
      vertical: 0.8u

nodes:
  inicio:
    type: ENTRYPOINT
    name: Início

  # =========================
  # LOGIN
  # =========================

  fazer_login:
    type: STEP
    name: Fazer Login
    position:
      anchor: inicio
      offset:
        x: 4u
        y: 0u

  logar:
    type: STEP
    name: Logar
    content: |
      Inputs:
      - RA
      - Senha
    position:
      anchor: fazer_login
      offset:
        x: 4u
        y: 0u

  credenciais_validas:
    type: DECISION
    name: Credenciais válidas?
    position:
      anchor: logar
      offset:
        x: 4u
        y: 0u

  erro_login:
    type: STEP
    name: Mensagem de Erro
    description: RA ou senha incorretos
    position:
      anchor: credenciais_validas
      offset:
        x: 4u
        y: 0.6u

  esqueceu_senha:
    type: STEP
    name: Esqueci Senha
    position:
      anchor: erro_login
      offset:
        x: 4u
        y: 0u

  token_email:
    type: STEP
    name: Token de validação por email
    position:
      anchor: esqueceu_senha
      offset:
        x: 4u
        y: 0u

  redefinir_senha:
    type: STEP
    name: Redefinir Senha
    position:
      anchor: token_email
      offset:
        x: 4u
        y: 0u

  # =========================
  # FORMULÁRIO DE INDICAÇÃO
  # =========================

  formulario_indicacao:
    type: STEP
    name: Formulário de Indicação
    content: |
      Inputs:
      - Nome
      - Email
      - Telefone
      - Token / Código de indicação
      - CPF
    position:
      anchor: credenciais_validas
      offset:
        x: 4u
        y: -0.6u

  escolher_pos:
    type: STEP
    name: Escolher Pós-Graduação
    position:
      anchor: formulario_indicacao
      offset:
        x: 4u
        y: 0u

  validacao_email:
    type: STEP
    name: Validação de E-mail
    position:
      anchor: escolher_pos
      offset:
        x: 4u
        y: 0u

  redirecionamento_lp:
    type: STEP
    name: Redirecionamento para LP do Curso
    position:
      anchor: validacao_email
      offset:
        x: 4u
        y: 0u

  metodo_pagamento:
    type: END
    name: Método de Pagamento
    position:
      anchor: redirecionamento_lp
      offset:
        x: 4u
        y: 0u

connections:
  # Entrada principal
  - from: inicio
    to: fazer_login

  - from: inicio
    to: formulario_indicacao
    label: Indicar

  # Login
  - from: fazer_login
    to: logar

  - from: logar
    to: credenciais_validas

  - from: credenciais_validas
    to: erro_login
    label: Não

  - from: credenciais_validas
    to: formulario_indicacao
    label: Sim

  # Recuperação de senha (com loop)
  - from: erro_login
    to: esqueceu_senha
    label: Esqueci senha

  - from: esqueceu_senha
    to: token_email

  - from: token_email
    to: redefinir_senha

  - from: redefinir_senha
    to: logar
    label: Tentar novamente

  # Indicação
  - from: formulario_indicacao
    to: escolher_pos

  - from: escolher_pos
    to: validacao_email

  - from: validacao_email
    to: redirecionamento_lp

  - from: redirecionamento_lp
    to: metodo_pagamento
