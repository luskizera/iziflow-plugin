<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>IziFlow</title>
  <style>
    /* CSS embutido */
    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* Alinha o conteúdo à esquerda */
      padding: 24px;
      gap: 24px;
      width: 600px;
      height: 400px;
      background: #FFFFFF;
      font-family: 'Inter', Arial, sans-serif;
    }

    h2 {
      margin: 0;
      font-weight: 600;
      font-size: 24px;
      line-height: 32px;
      color: #09090B;
      text-align: left; /* Alinha o texto à esquerda */
    }

    textarea {
      font-family: 'Inter', Arial, sans-serif;
      width: 100%;
      height: 200px;
      padding: 8px 12px;
      border: 1px solid #E4E4E7;
      border-radius: 8px;
      font-size: 14px;
      line-height: 20px;
      color: #09090B;
      resize: none;
      transition: border-color 0.3s ease; /* Suaviza a transição de cor */
    }

    /* Altera a borda do textarea ao receber foco */
    textarea:focus {
      border: 2px solid #A1A1AA; /* Aumenta a espessura da borda */
      outline: none;
    }

    button {
      padding: 8px 16px;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #FAFAFA;
      background-color: #18181B;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      align-self: flex-end;
    }

    button:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <h2>JSON from User Flow</h2>
  <textarea id="jsonInput" placeholder="JSON from User Flow"></textarea>
  <button id="generateButton">Generate Flow</button>

  <script>
    // JavaScript embutido
    document.getElementById("generateButton").onclick = () => {
      const jsonInput = document.getElementById("jsonInput").value;

      try {
        const parsedJSON = JSON.parse(jsonInput); // Validação básica
        console.log("Enviando JSON para o plugin:", parsedJSON); // Verificar se está enviando o JSON

        parent.postMessage(
          {
            pluginMessage: {
              type: "generate-flow",
              json: JSON.stringify(parsedJSON),
            },
          },
          "*"
        );
      } catch (error) {
        alert("JSON inválido! Corrija o erro e tente novamente.");
      }
    };
  </script>
</body>
</html>
